<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            height: 200px;
            width: 200px;
            border: 3px solid black ;
            border-radius: 50%;
            
        }
        .image-container{
            border: 10px solid red;
            position: relative;
            left: 25%;
            width: 203px;
            height: 203px;

        }
        .dot{
            height: 50px;
            width: 50px;
            background-color: greenyellow;
            border-color: aquamarine;
            border-radius: 50%;
            position: absolute;
            top: 0px;
            right: 0px;

        }
        h1,h2{
            text-align: center;
        }
        *{
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="./Profilepic.jpeg" alt="profilepic"/>
        <div class="dot"></div>
    </div>
    <h1> Frontend Developer</h1>
    <h2> Aditya Pratap Singh</h2>
    
</body>
</html>
